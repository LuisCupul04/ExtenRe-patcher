name: Build pull request

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  release:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}   # ← solo cambias esta línea
        run: ./gradlew build --no-daemon